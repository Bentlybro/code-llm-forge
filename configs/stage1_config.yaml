# Stage 1: Code + Reasoning Fine-Tuning Config
model:
  name: "Qwen/Qwen2.5-Coder-7B-Instruct"
  max_seq_length: 4096
  load_in_4bit: true

lora:
  rank: 32
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2e-4
  num_epochs: 2
  warmup_ratio: 0.05
  weight_decay: 0.01
  lr_scheduler: cosine
  optimizer: adamw_8bit

dataset:
  mix_ratio:
    codefeedback: 0.45
    magicoder_oss: 0.22
    magicoder_evol: 0.33
  total_target: 340000
